name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
      
      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/catskit_keystore.jks
      
      - name: Create signing config
        run: |
          cat > android/local.properties << EOF
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.44.1-x64
          sdk.dir=/usr/local/lib/android/sdk
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --split-per-abi
      
      - name: Get version info
        id: version
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "CatsKit ${{ steps.version.outputs.TAG }}"
          prerelease: true
          body: |
            ## 预发行版本 - ${{ steps.version.outputs.TAG }}
              - 发布日期：${{ steps.version.outputs.DATE }}
              - 这是一个预发行版本，可能包含未完全测试的功能。
              
              ### 新功能
              - 现在组车工具可以同时组多辆车
              - 数据展示界面将展示随从型部件（无人机）的生命值和部分车轮的攻击力

              ### 修复与调整
              - 修复了网络诊断在某些情况无日志输出的问题
              - 调整了部分名词
              - 调整了部分UI
              - 修复了同版本可更新的问题
            
            ### 📱 下载安装
            | 文件 | 适用设备 |
            |------|---------|
            | `app-arm64-v8a-release.apk` | 主流手机（推荐） |
            | `app-armeabi-v7a-release.apk` | 老旧设备 |
            | `app-x86_64-release.apk` | 模拟器 |
            
            ### 🔧 系统要求
            - Android 5.0 及以上
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}